workflows:
  ios-release:
    name: B Clic Krul iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.sports.bclic.krul

      vars:
        XCODE_PROJECT: "BClicKrul.xcodeproj"
        XCODE_SCHEME: "BClicKrul"
        BUNDLE_ID: "com.sports.bclic.krul"
        APP_STORE_APPLE_ID: "6763876899"

    integrations:
      app_store_connect: Key

    scripts:
      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
